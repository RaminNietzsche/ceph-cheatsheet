name: Docs

# Publish MkDocs to GitHub Pages (project site), then serve publicly at
# http://blog.ceph-s3.ir/ via Cloudflare reverse proxy to
# https://raminnietzsche.github.io/ceph-cheatsheet/
#
# URL layout: / → en/ · /en/ · /fa/ · /zh/
# Do not set a custom domain on this repository — blog.ceph-s3.ir is proxied
# at the site root. MkDocs site_url matches the public URL.

on:
  push:
    branches: [main, master]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

env:
  PUBLIC_SITE_URL: https://blog.ceph-s3.ir/

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: scripts/requirements.txt

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Install dependencies
        run: pip install -r scripts/requirements.txt

      - name: Ensure docs locale layout
        run: python3 scripts/setup-docs-layout.py

      - name: Sync cheatsheet hub
        run: python3 scripts/sync-docs-index.py

      - name: Sync RGW docs from docs-extended
        if: hashFiles('dev-code/rgw/docs-extended/pages/**') != ''
        run: python3 scripts/sync-rgw-from-docs-extended.py

      - name: Lint and test Python scripts
        run: python3 -m pytest scripts/tests/ -q

      - name: Generate role & scale guides
        run: python3 scripts/generate-role-scale-guides.py

      - name: Generate RGW config guides
        run: python3 scripts/generate-rgw-guide.py

      - name: Generate other subsystem config guides
        run: python3 scripts/generate-config-guide.py all

      - name: Sync i18n config tables
        run: python3 scripts/sync-i18n-config.py

      - name: Sync i18n hand-written pages
        run: python3 scripts/sync-i18n-pages.py

      - name: Sync README (en/fa/zh)
        run: python3 scripts/sync-readme-i18n.py

      - name: Verify README locales committed
        run: |
          git diff --exit-code README.md README.fa.md README.zh.md || {
            echo "::error::README locales out of date. Edit README.md + scripts/locales/pages/readme.yaml, then: make readme"
            exit 1
          }

      - name: Regenerate content inventory
        run: python3 scripts/generate-content-inventory.py

      - name: Generate page trust manifest
        run: python3 scripts/generate-page-trust-manifest.py

      - name: Verify content inventory is committed
        run: |
          git diff --exit-code reports/content-inventory.csv reports/content-inventory.md || {
            echo "::error::Content inventory is out of date. Run: python3 scripts/generate-content-inventory.py"
            exit 1
          }

      - name: Build MkDocs site
        run: |
          python3 scripts/fix-html-hrefs.py
          python3 scripts/validate-docs-paths.py
          mkdocs build
          python3 scripts/restructure-site-locales.py

      - name: Verify site artifact
        if: github.event_name != 'pull_request'
        run: |
          test -f site/index.html
          test -f site/en/index.html
          test -d site/fa
          test -d site/zh
          grep -q 'url=en/' site/index.html

      - name: Upload Pages artifact
        if: github.event_name != 'pull_request'
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    if: github.event_name != 'pull_request' && github.ref == 'refs/heads/main'
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ env.PUBLIC_SITE_URL }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
