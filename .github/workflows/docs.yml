name: Docs

on:
  push:
    branches: [main, master]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: pages-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: scripts/requirements.txt

      - name: Install dependencies
        run: pip install -r scripts/requirements.txt

      - name: Sync MkDocs home page
        run: python3 scripts/sync-docs-index.py

      - name: Generate role & scale guides
        run: python3 scripts/generate-role-scale-guides.py

      - name: Generate RGW config guides
        run: python3 scripts/generate-rgw-guide.py

      - name: Generate other subsystem config guides
        run: python3 scripts/generate-config-guide.py all

      - name: Sync i18n config tables
        run: python3 scripts/sync-i18n-config.py

      - name: Sync i18n hand-written pages
        run: python3 scripts/sync-i18n-pages.py

      - name: Build MkDocs site
        run: |
          python3 scripts/fix-html-hrefs.py
          mkdocs build

      - name: Upload Pages artifact
        if: github.event_name != 'pull_request'
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    if: github.event_name != 'pull_request' && github.ref == 'refs/heads/main'
    needs: build
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
