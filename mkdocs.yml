site_name: Ceph Cheatsheet
site_description: Offline Ceph CLI and configuration reference
site_url: https://blog.raminnietzsche.ir/ceph-cheatsheet/
repo_url: https://github.com/RaminNietzsche/ceph-cheatsheet
repo_name: RaminNietzsche/ceph-cheatsheet

docs_dir: docs
site_dir: site

exclude_docs: |
  /scripts/
  /site/
  /.git/
  /.github/
  /README.md
  /REFERENCE.md
  /config/readme.md

theme:
  name: material
  language: en
  palette:
    - scheme: default
      primary: cyan
      accent: deep orange
      toggle:
        icon: material/brightness-7
        name: Dark mode
    - scheme: slate
      primary: cyan
      accent: deep orange
      toggle:
        icon: material/brightness-4
        name: Light mode
  features:
    - navigation.tabs
    - navigation.sections
    - search.suggest
    - search.highlight
    - content.code.copy
    - toc.follow
  icon:
    repo: fontawesome/brands/github

extra_css:
  - stylesheets/extra.css

plugins:
  - search

markdown_extensions:
  - tables
  - attr_list
  - md_in_html
  - toc:
      permalink: true
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true

nav:
  - Home: index.md
  - Guides:
    - Overview: guides/OVERVIEW.md
    - Quick start: guides/quickstart.md
    - Config lookup: guides/config-lookup.md
