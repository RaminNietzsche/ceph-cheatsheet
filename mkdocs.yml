site_name: Ceph Docs Hub
site_description: Ceph cheatsheet, RGW architecture, and developer documentation
site_url: http://blog.ceph-s3.ir/
repo_url: https://github.com/RaminNietzsche/ceph-cheatsheet
repo_name: RaminNietzsche/ceph-cheatsheet

docs_dir: docs
site_dir: site

exclude_docs: |
  /scripts/
  /site/
  /.git/
  /.github/
  /README.md
  /REFERENCE.md
  /config/readme.md

theme:
  name: material
  language: en
  palette:
    - scheme: slate
      primary: cyan
      accent: cyan
      toggle:
        icon: material/brightness-4
        name: Light mode
    - scheme: default
      primary: cyan
      accent: cyan
      toggle:
        icon: material/brightness-7
        name: Dark mode
  features:
    - navigation.tabs
    - navigation.sections
    - search.suggest
    - search.highlight
    - content.code.copy
    - toc.follow
  icon:
    repo: fontawesome/brands/github

extra_css:
  - stylesheets/extra.css
  - stylesheets/site-theme.css
  - stylesheets/readability.css
  - stylesheets/internal-ergonomics.css
  - stylesheets/hub.css
  - https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css

extra_javascript:
  - https://unpkg.com/mermaid@10/dist/mermaid.min.js
  - javascripts/hub.js
  - javascripts/site-theme.js
  - javascripts/copy-feedback.js

plugins:
  - search:
      lang:
        - en
        - zh
  - i18n:
      docs_structure: suffix
      fallback_to_default: true
      reconfigure_material: true
      languages:
        - locale: en
          default: true
          name: English
          build: true
        - locale: fa
          name: فارسی
          build: true
          direction: rtl
          theme:
            font:
              text: Vazirmatn
          nav_translations:
            Home: خانه
            Cheatsheet: Cheatsheet
            Arch: معماری
            Dev: توسعه
            Guides: راهنما
            CLI: خط فرمان
            Config: پیکربندی
            Overview: نمای کلی
            "Quick start": شروع سریع
            "Config lookup": جستجوی پیکربندی
            Contributing: مشارکت
            "Config deep dives": راهنمای عمیق پیکربندی
            "By role": بر اساس نقش
            "By scale": بر اساس مقیاس
            Cluster: کلاستر
            "Cluster admin": مدیر کلاستر
            "Storage operator": مسئول ذخیره‌سازی
            "RGW admin": مدیر RGW
            "CephFS admin": مدیر CephFS
            Lab: آزمایشگاه
            "Small production": محیط عملیاتی کوچک
            "Large production": محیط عملیاتی بزرگ
            Multisite: چندسایته
            "OSD & pools": OSD و pool
            RADOS: RADOS
            RBD: RBD
            RGW: RGW
            CephFS: CephFS
            Cephadm: Cephadm
            Troubleshooting: عیب‌یابی
        - locale: zh
          name: 中文
          build: true
          nav_translations:
            Home: 首页
            Cheatsheet: 速查表
            Arch: 架构
            Dev: 开发
            Guides: 指南
            CLI: 命令行
            Config: 配置
            Overview: 概览
            "Quick start": 快速入门
            "Config lookup": 配置查找
            Contributing: 贡献
            "Config deep dives": 配置深度指南
            "By role": 按角色
            "By scale": 按规模
            "Cluster admin": 集群管理员
