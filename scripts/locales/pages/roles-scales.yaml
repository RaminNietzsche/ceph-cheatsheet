# Role and scale guides — en / fa / zh (CLI blocks stay English in all locales).

guides/roles/cluster-admin:
  en: |
    # Cluster Admin

    <span class="badge badge-role-cluster">Cluster admin</span> Manage monitors, managers, orchestration, cluster health, auth, and upgrades.

    ## Daily commands

    ```bash
    ceph -s
    ceph health detail
    ceph versions
    ceph orch ps                    # cephadm
    ceph mon stat
    ceph mgr stat
    ```

    See [cluster CLI](../../cli/cluster.md) and [cephadm CLI](../../cli/cephadm.md).

    ## Configuration

    | Task | Command / config |
    |------|------------------|
    | Runtime config | [cli/config.md](../../cli/config.md) — `ceph config set …` |
    | Monitor options | [config/mon/INDEX.md](../../config/mon/INDEX.md) · [MON deep dive](../mon-config/OVERVIEW.md) |
    | Manager / modules | [config/mgr/INDEX.md](../../config/mgr/INDEX.md) · [MGR deep dive](../mgr-config/OVERVIEW.md) |
    | Auth & keys | [config/global/auth.md](../../config/global/auth.md) · [Global deep dive](../global-config/OVERVIEW.md) |
    | cephadm path | `cephadm_path` in [config/mgr/cephadm.md](../../config/mgr/cephadm.md) |

    Hot options: `mon_osd_down_out_interval`, `mgr_standby_modules`, `cephadm_path` — see [MON](../mon-config/TUNING.md) and [MGR](../mgr-config/TUNING.md) tuning indexes.

    ## Common workflows

    **Deploy services (cephadm):**

    ```bash
    ceph orch apply mon --placement="3"
    ceph orch apply mgr --placement="2"
    ceph orch apply osd --all-available-devices
    ```

    **Upgrade cluster:**

    ```bash
    ceph orch upgrade ls
    ceph orch upgrade start --image quay.io/ceph/ceph:v19
    ceph orch upgrade status
    ```

    **Add host / monitor:**

    ```bash
    ceph orch host add newhost --labels _admin
    ceph orch apply mon --placement="host1 host2 host3"
    ```

    ## Scale notes

    | Scale | Focus |
    |-------|--------|
    | [Lab](../scales/lab.md) | Single mon, `--single-host-defaults` |
    | [Small production](../scales/small-production.md) | 3 mon, 2 mgr, one DC |
    | [Large production](../scales/large-production.md) | Stretch rules, separate networks |
    | [Multisite](../scales/multisite.md) | Mon quorum per site or stretch |

    ## Troubleshooting

    [cli/troubleshooting.md](../../cli/troubleshooting.md) — logs, mon quorum, upgrade stalls

    [← Guides overview](../OVERVIEW.md)

  fa: |
    # مدیر کلاستر

    <span class="badge badge-role-cluster">Cluster admin</span> مدیریت monitor، manager، orchestration، سلامت کلاستر، auth و upgrade.

    ## دستورات روزانه

    ```bash
    ceph -s
    ceph health detail
    ceph versions
    ceph orch ps                    # cephadm
    ceph mon stat
    ceph mgr stat
    ```

    [CLI کلاستر](../../cli/cluster.md) · [CLI cephadm](../../cli/cephadm.md)

    ## پیکربندی

    | کار | دستور / config |
    |------|----------------|
    | پیکربندی runtime | [cli/config.md](../../cli/config.md) — `ceph config set …` |
    | گزینه‌های MON | [config/mon/INDEX.md](../../config/mon/INDEX.md) · [deep dive MON](../mon-config/OVERVIEW.md) |
    | Manager / ماژول‌ها | [config/mgr/INDEX.md](../../config/mgr/INDEX.md) · [deep dive MGR](../mgr-config/OVERVIEW.md) |
    | Auth و کلیدها | [config/global/auth.md](../../config/global/auth.md) · [deep dive Global](../global-config/OVERVIEW.md) |
    | مسیر cephadm | `cephadm_path` در [config/mgr/cephadm.md](../../config/mgr/cephadm.md) |

    گزینه‌های پرکاربرد: `mon_osd_down_out_interval`، `mgr_standby_modules`، `cephadm_path` — [MON](../mon-config/TUNING.md) و [MGR](../mgr-config/TUNING.md).

    ## workflowهای رایج

    **استقرار سرویس (cephadm):**

    ```bash
    ceph orch apply mon --placement="3"
    ceph orch apply mgr --placement="2"
    ceph orch apply osd --all-available-devices
    ```

    **Upgrade کلاستر:**

    ```bash
    ceph orch upgrade ls
    ceph orch upgrade start --image quay.io/ceph/ceph:v19
    ceph orch upgrade status
    ```

    **افزودن host / monitor:**

    ```bash
    ceph orch host add newhost --labels _admin
    ceph orch apply mon --placement="host1 host2 host3"
    ```

    ## یادداشت مقیاس

    | مقیاس | تمرکز |
    |-------|--------|
    | [Lab](../scales/lab.md) | یک mon، `--single-host-defaults` |
    | [Small production](../scales/small-production.md) | ۳ mon، ۲ mgr، یک DC |
    | [Large production](../scales/large-production.md) | stretch، شبکه جدا |
    | [Multisite](../scales/multisite.md) | quorum هر سایت یا stretch |

    ## عیب‌یابی

    [cli/troubleshooting.md](../../cli/troubleshooting.md)

    [← نمای کلی راهنما](../OVERVIEW.md)

  zh: |
    # 集群管理员

    <span class="badge badge-role-cluster">Cluster admin</span> 管理 Monitor、Manager、编排、集群健康、认证与升级。

    ## 日常命令

    ```bash
    ceph -s
    ceph health detail
    ceph versions
    ceph orch ps                    # cephadm
    ceph mon stat
    ceph mgr stat
    ```

    [集群 CLI](../../cli/cluster.md) · [cephadm CLI](../../cli/cephadm.md)

    ## 配置

    | 任务 | 命令 / 配置 |
    |------|------------|
    | 运行时配置 | [cli/config.md](../../cli/config.md) — `ceph config set …` |
    | Monitor 选项 | [config/mon/INDEX.md](../../config/mon/INDEX.md) · [MON 深度指南](../mon-config/OVERVIEW.md) |
    | Manager / 模块 | [config/mgr/INDEX.md](../../config/mgr/INDEX.md) · [MGR 深度指南](../mgr-config/OVERVIEW.md) |
    | 认证与密钥 | [config/global/auth.md](../../config/global/auth.md) · [Global 深度指南](../global-config/OVERVIEW.md) |
    | cephadm 路径 | [config/mgr/cephadm.md](../../config/mgr/cephadm.md) 中的 `cephadm_path` |

    常用选项：`mon_osd_down_out_interval`、`mgr_standby_modules`、`cephadm_path` — 见 [MON](../mon-config/TUNING.md) 与 [MGR](../mgr-config/TUNING.md) 调优索引。

    ## 常见工作流

    **部署服务（cephadm）：**

    ```bash
    ceph orch apply mon --placement="3"
    ceph orch apply mgr --placement="2"
    ceph orch apply osd --all-available-devices
    ```

    **升级集群：**

    ```bash
    ceph orch upgrade ls
    ceph orch upgrade start --image quay.io/ceph/ceph:v19
    ceph orch upgrade status
    ```

    **添加主机 / Monitor：**

    ```bash
    ceph orch host add newhost --labels _admin
    ceph orch apply mon --placement="host1 host2 host3"
    ```

    ## 规模说明

    | 规模 | 重点 |
    |------|------|
    | [Lab](../scales/lab.md) | 单 Mon、`--single-host-defaults` |
    | [Small production](../scales/small-production.md) | 3 Mon、2 MGR、单数据中心 |
    | [Large production](../scales/large-production.md) | Stretch、独立网络 |
    | [Multisite](../scales/multisite.md) | 每站点 quorum 或 stretch |

    ## 故障排查

    [cli/troubleshooting.md](../../cli/troubleshooting.md)

    [← 指南概览](../OVERVIEW.md)

guides/roles/storage-operator:
  en: |
    # Storage Operator

    <span class="badge badge-role-storage">Storage operator</span> Manage OSDs, pools, placement groups, CRUSH, recovery, and scrub.

    ## Daily commands

    ```bash
    ceph osd stat
    ceph osd tree
    ceph osd df tree
    ceph pg stat
    ceph pg dump_stuck
    ceph df detail
    ```

    See [OSD & pools CLI](../../cli/osd-pool.md) and [RADOS CLI](../../cli/rados.md).

    ## Configuration

    | Area | Config index |
    |------|--------------|
    | OSD daemon | [config/osd/INDEX.md](../../config/osd/INDEX.md) · [OSD deep dive](../osd-config/OVERVIEW.md) |
    | Global / bluestore | [config/global/osd.md](../../config/global/osd.md), [bluestore.md](../../config/global/bluestore.md) |
    | Recovery & scrub | [osd-config/recovery](../osd-config/recovery/recovery.md), [scrub](../osd-config/scrub/scrub.md) |
    | mClock | [osd-config/mclock](../osd-config/mclock/mclock.md) — `osd_mclock_profile` |

    Look up any option:

    ```bash
    ./scripts/lookup-config.sh osd_max_scrubs
    ./scripts/search-config.sh -s osd recovery
    ```

    ## Common workflows

    **OSD maintenance:**

    ```bash
    ceph osd safe-to-destroy 5
    ceph osd out 5
    # stop osd, replace disk, redeploy
    ceph osd in 5
    ```

    **Create replicated pool:**

    ```bash
    ceph osd pool create mypool 128 128 replicated
    ceph osd pool application enable mypool rbd
    ceph osd pool autoscale-status
    ```

    **Rebalance:**

    ```bash
    ceph osd reweight-by-utilization
    ceph osd crush reweight osd.5 0.95
    ```

    ## Scale notes

    | Scale | Focus |
    |-------|--------|
    | [Lab](../scales/lab.md) | Lower `osd_memory_target`, fewer PGs |
    | [Small production](../scales/small-production.md) | Autoscale on, replica 3 |
    | [Large production](../scales/large-production.md) | mClock, device classes, scrub windows |
    | [Multisite](../scales/multisite.md) | CRUSH per site; pool layout for DR |

    ## Troubleshooting

    Degraded PGs, backfill throttling, nearfull — [cli/troubleshooting.md](../../cli/troubleshooting.md)

    [← Guides overview](../OVERVIEW.md)

