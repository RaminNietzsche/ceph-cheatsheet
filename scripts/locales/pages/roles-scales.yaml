guides/roles/cephfs-admin:
  en: |
    # CephFS Admin

    <span class="badge badge-role-cephfs">CephFS admin</span> Manage Ceph file systems, metadata servers (MDS), subvolumes, and mirroring.

    ## Daily commands

    ```bash
    ceph fs ls
    ceph fs status myfs
    ceph mds stat
    ceph orch ps --service-type mds
    ```

    See [CephFS CLI](../../cli/cephfs.md).

    ## Configuration

    | Area | Config index |
    |------|--------------|
    | MDS daemon | [config/mds/INDEX.md](../../config/mds/INDEX.md) · [MDS deep dive](../mds-config/OVERVIEW.md) |
    | Client / FUSE | [config/mds-client/INDEX.md](../../config/mds-client/INDEX.md) · [client deep dive](../mds-client-config/OVERVIEW.md) |
    | CephFS mirror | [config/cephfs-mirror/INDEX.md](../../config/cephfs-mirror/INDEX.md) · [mirror deep dive](../cephfs-mirror-config/OVERVIEW.md) |

    Key options: `mds_cache_memory_limit`, `mds_max_file_size` — [MDS TUNING](../mds-config/TUNING.md)

    ```bash
    ./scripts/lookup-config.sh mds_cache_memory_limit
    ```

    ## Common workflows

    **Create file system:**

    ```bash
    ceph osd pool create cephfs-metadata 32 32
    ceph osd pool create cephfs-data 128 128
    ceph fs new myfs cephfs-metadata cephfs-data
    ceph orch apply mds myfs --placement="2"
    ```

    **Subvolume:**

    ```bash
    ceph fs subvolume create myfs vol1 --size 10737418240
    ceph fs subvolume info myfs vol1
    ```

    **Snapshot mirroring:**

    ```bash
    ceph fs snapshot mirror enable myfs
    ```

    ## Scale notes

    | Scale | Focus |
    |-------|--------|
    | [Lab](../scales/lab.md) | 1 MDS, small cache |
    | [Small production](../scales/small-production.md) | 2 MDS for HA |
    | [Multisite](../scales/multisite.md) | cephfs-mirror DR |

    [← Guides overview](../OVERVIEW.md)

  fa: |
    # مدیر CephFS

    <span class="badge badge-role-cephfs">CephFS admin</span> مدیریت فایل‌سیستم Ceph، MDS، subvolume و mirroring.

    ## دستورات روزانه

    ```bash
    ceph fs ls
    ceph fs status myfs
    ceph mds stat
    ceph orch ps --service-type mds
    ```

    [CLI CephFS](../../cli/cephfs.md)

    ## پیکربندی

    | حوزه | INDEX |
    |------|-------|
    | MDS | [config/mds/INDEX.md](../../config/mds/INDEX.md) · [deep dive](../mds-config/OVERVIEW.md) |
    | Client | [mds-client/INDEX.md](../../config/mds-client/INDEX.md) · [deep dive](../mds-client-config/OVERVIEW.md) |
    | Mirror | [cephfs-mirror/INDEX.md](../../config/cephfs-mirror/INDEX.md) · [deep dive](../cephfs-mirror-config/OVERVIEW.md) |

    گزینه‌های کلیدی: `mds_cache_memory_limit` — [TUNING](../mds-config/TUNING.md)

    ```bash
    ./scripts/lookup-config.sh mds_cache_memory_limit
    ```

    ## workflowهای رایج

    ```bash
    ceph osd pool create cephfs-metadata 32 32
    ceph osd pool create cephfs-data 128 128
    ceph fs new myfs cephfs-metadata cephfs-data
    ceph orch apply mds myfs --placement="2"
    ceph fs subvolume create myfs vol1 --size 10737418240
    ceph fs snapshot mirror enable myfs
    ```

    ## یادداشت مقیاس

    | مقیاس | تمرکز |
    |-------|--------|
    | [Lab](../scales/lab.md) | ۱ MDS |
    | [Small production](../scales/small-production.md) | ۲ MDS برای HA |
    | [Multisite](../scales/multisite.md) | cephfs-mirror |

    [← نمای کلی راهنما](../OVERVIEW.md)

  zh: |
    # CephFS 管理员

    <span class="badge badge-role-cephfs">CephFS admin</span> 管理 Ceph 文件系统、MDS、子卷与镜像。

    ## 日常命令

