guides/scales/lab:
  en: |
    # Lab / Development Scale

    <span class="badge badge-scale-lab">Lab / dev</span> 1–3 nodes, testing, learning, CI — **not for production data**.

    ## Goals

    - Minimal footprint, fast iteration
    - Accept single points of failure
    - Looser durability only on isolated lab networks

    ## Suggested layout

    ```bash
    cephadm bootstrap --mon-ip <ip> --single-host-defaults
    ceph orch apply mon --placement="1"
    ceph orch apply mgr --placement="1"
    ceph orch apply osd --all-available-devices
    ```

    ## Tuning hints

    | Area | Lab approach |
    |------|--------------|
    | Replication | `size=2` with `--single-host-defaults` on one host |
    | PGs | Autoscale on; small pools |
    | OSD memory | Lower `osd_memory_target` if RAM constrained |
    | Scrub | Longer intervals to reduce disk churn |

    ```bash
    ./scripts/lookup-config.sh osd_memory_target
    ./scripts/lookup-config.sh osd_pool_default_pg_autoscale_mode
    ```

    ## Role guides

    | Role | Guide |
    |------|-------|
    | Cluster | [cluster-admin.md](../roles/cluster-admin.md) |
    | Storage | [storage-operator.md](../roles/storage-operator.md) |
    | RGW (optional) | [rgw-admin.md](../roles/rgw-admin.md) |
    | CephFS (optional) | [cephfs-admin.md](../roles/cephfs-admin.md) |

    ## CLI quick ref

    [cli/cluster.md](../../cli/cluster.md) · [cli/osd-pool.md](../../cli/osd-pool.md)

    [← Guides overview](../OVERVIEW.md)

  fa: |
    # مقیاس Lab / توسعه

    <span class="badge badge-scale-lab">Lab / dev</span> ۱–۳ نود، تست و یادگیری — **نه برای داده production**.

    ## اهداف

    - حداقل منابع، تکرار سریع
    - پذیرش single point of failure
    - durability شل‌تر فقط در شبکه lab ایزوله

    ## چیدمان پیشنهادی

    ```bash
    cephadm bootstrap --mon-ip <ip> --single-host-defaults
    ceph orch apply mon --placement="1"
    ceph orch apply mgr --placement="1"
    ceph orch apply osd --all-available-devices
    ```

    ## تنظیم

    | حوزه | رویکرد lab |
    |------|------------|
    | Replication | `size=2` با `--single-host-defaults` |
    | PG | autoscale؛ pool کوچک |
    | حافظه OSD | `osd_memory_target` پایین‌تر |
    | Scrub | interval بلندتر |

    ```bash
    ./scripts/lookup-config.sh osd_memory_target
    ```

    ## راهنمای نقش

    | نقش | راهنما |
    |------|--------|
    | Cluster | [cluster-admin.md](../roles/cluster-admin.md) |
    | Storage | [storage-operator.md](../roles/storage-operator.md) |

    [← نمای کلی راهنما](../OVERVIEW.md)

  zh: |
    # Lab / 开发规模

    <span class="badge badge-scale-lab">Lab / dev</span> 1–3 节点，测试与学习 — **不用于生产数据**。

    ## 目标

    - 最小 footprint、快速迭代
    - 可接受单点故障
    - 仅在隔离 lab 网络放宽 durability

    ## 建议布局

    ```bash
    cephadm bootstrap --mon-ip <ip> --single-host-defaults
    ceph orch apply mon --placement="1"
    ceph orch apply mgr --placement="1"
    ceph orch apply osd --all-available-devices
    ```

    ## 调优提示

    | 领域 | Lab 做法 |
    |------|----------|
    | 副本 | 单主机 `--single-host-defaults` 下 `size=2` |
    | PG | 自动扩缩；小池 |
    | OSD 内存 | 降低 `osd_memory_target` |
    | Scrub | 延长间隔 |

    ```bash
    ./scripts/lookup-config.sh osd_memory_target
    ```

    ## 角色指南

    | 角色 | 指南 |
    |------|------|
    | 集群 | [cluster-admin.md](../roles/cluster-admin.md) |
    | 存储 | [storage-operator.md](../roles/storage-operator.md) |

    [← 指南概览](../OVERVIEW.md)

guides/scales/small-production:
  en: |
    # Small Production Scale

    <span class="badge badge-scale-small">Small production</span> Typically **3–12 nodes**, one datacenter, replica **3**, cephadm-managed.

    ## Architecture checklist

    - [ ] 3 monitors on separate hosts
    - [ ] 2 manager daemons (active + standby)
    - [ ] OSDs: one per disk; separate mon/osd networks if possible
    - [ ] PG autoscale **on** for all pools
    - [ ] Pool `application` tag set (rbd, rgw, cephfs)

    ## Daily operations

    Follow [quickstart.md](../quickstart.md) and role guides:

    | Role | Guide |
    |------|-------|
    | Cluster | [cluster-admin.md](../roles/cluster-admin.md) |
    | OSD / pools | [storage-operator.md](../roles/storage-operator.md) |
    | RGW | [rgw-admin.md](../roles/rgw-admin.md) |
    | CephFS | [cephfs-admin.md](../roles/cephfs-admin.md) |

    ## Key config to verify

    ```bash
    ceph config get mon osd_pool_default_pg_autoscale_mode
    ceph config get mgr mon_target_pg_per_osd
    ceph osd pool autoscale-status
    ```

    Deep dives: [OSD](../osd-config/OVERVIEW.md) · [MON](../mon-config/OVERVIEW.md) · [MGR](../mgr-config/TUNING.md)

    ## Capacity planning

    ```bash
    ceph df detail
    ceph osd df tree
    ```

    Plan for **~70% usable** before `nearfull`; leave headroom for backfill during OSD replacement.

    ## Upgrades

    Rolling upgrade via cephadm — [cli/cephadm.md](../../cli/cephadm.md)

    [← Guides overview](../OVERVIEW.md)

  fa: |
    # مقیاس Small Production

    <span class="badge badge-scale-small">Small production</span> معمولاً **۳–۱۲ نود**، یک datacenter، replica **3**، cephadm.

    ## چک‌لیست معماری

    - [ ] ۳ monitor روی host جدا
    - [ ] ۲ manager (active + standby)
    - [ ] یک OSD به ازای هر دیسک
    - [ ] PG autoscale **روشن**
    - [ ] برچسب `application` روی pool

    ## عملیات روزانه

    [quickstart.md](../quickstart.md) و راهنمای نقش:

    | نقش | راهنما |
    |------|--------|
    | Cluster | [cluster-admin.md](../roles/cluster-admin.md) |
    | Storage | [storage-operator.md](../roles/storage-operator.md) |
    | RGW | [rgw-admin.md](../roles/rgw-admin.md) |
    | CephFS | [cephfs-admin.md](../roles/cephfs-admin.md) |

    ## پیکربندی کلیدی

    ```bash
    ceph config get mon osd_pool_default_pg_autoscale_mode
    ceph config get mgr mon_target_pg_per_osd
    ceph osd pool autoscale-status
    ```

    Deep dive: [OSD](../osd-config/OVERVIEW.md) · [MON](../mon-config/OVERVIEW.md)

    ## ظرفیت

    ```bash
    ceph df detail
    ceph osd df tree
    ```

    حدود **۷۰٪** قابل استفاده قبل از `nearfull`.

    [← نمای کلی راهنما](../OVERVIEW.md)

  zh: |
    # 小型生产规模

    <span class="badge badge-scale-small">Small production</span> 通常 **3–12 节点**、单数据中心、**三副本**、cephadm 管理。

    ## 架构检查清单

    - [ ] 3 个 Monitor 分布在不同主机
    - [ ] 2 个 Manager（active + standby）
    - [ ] 每盘一个 OSD
    - [ ] 所有池开启 PG 自动扩缩
    - [ ] 池设置 `application` 标签

    ## 日常运维

    [quickstart.md](../quickstart.md) 与角色指南：

    | 角色 | 指南 |
    |------|------|
    | 集群 | [cluster-admin.md](../roles/cluster-admin.md) |
    | 存储 | [storage-operator.md](../roles/storage-operator.md) |
    | RGW | [rgw-admin.md](../roles/rgw-admin.md) |
    | CephFS | [cephfs-admin.md](../roles/cephfs-admin.md) |

    ## 关键配置

    ```bash
    ceph config get mon osd_pool_default_pg_autoscale_mode
    ceph config get mgr mon_target_pg_per_osd
    ceph osd pool autoscale-status
    ```

    深度指南：[OSD](../osd-config/OVERVIEW.md) · [MON](../mon-config/OVERVIEW.md)

    ## 容量规划

    ```bash
    ceph df detail
    ceph osd df tree
    ```

    `nearfull` 前约 **70%** 可用容量。

    [← 指南概览](../OVERVIEW.md)

guides/scales/large-production:
  en: |
    # Large Production Scale

    <span class="badge badge-scale-large">Large production</span> **12+ nodes**, many OSDs, strict SLAs, separate networks, performance tuning.

    ## Focus areas

    | Area | Actions |
    |------|---------|
    | Scheduling | `osd_mclock_profile`, device classes (ssd/hdd/nvme) |
    | PG balance | Autoscale + `mon_target_pg_per_osd`; avoid hot OSDs |
    | Scrub | `osd_max_scrubs`, deep-scrub windows |
    | Networks | `public_network` / `cluster_network` — [global/public.md](../../config/global/public.md) |
    | Failure domains | CRUSH rules per rack / datacenter |

    ## Commands

    ```bash
    ceph osd crush class ls
    ceph osd crush tree
    ceph osd perf
    ceph osd reweight-by-utilization 0.05
    ceph osd ok-to-stop osd.0 osd.1 osd.2
    ```

    ## Config to review

    ```bash
    ./scripts/search-config.sh -s osd mclock
    ./scripts/lookup-config.sh osd_mclock_profile
    ./scripts/lookup-config.sh osd_max_scrubs
    ./scripts/lookup-config.sh mon_osd_full_ratio
    ```

    Deep dives: [OSD](../osd-config/OVERVIEW.md) · [recovery](../osd-config/recovery/recovery.md) · [scrub](../osd-config/scrub/scrub.md)

    ## Throttle recovery (business hours)

    ```bash
    ceph config set osd osd_max_backfills 1
    ceph config set osd osd_recovery_max_active 3
    ```

    ## Role guides

    [storage-operator.md](../roles/storage-operator.md) · [cluster-admin.md](../roles/cluster-admin.md)

    [← Guides overview](../OVERVIEW.md)

  fa: |
    # مقیاس Large Production

    <span class="badge badge-scale-large">Large production</span> **۱۲+ نود**، OSD زیاد، SLA سخت، شبکه جدا، تنظیم performance.

    ## حوزه‌های تمرکز

    | حوزه | اقدام |
    |------|--------|
    | زمان‌بندی | `osd_mclock_profile`، device class |
    | PG | autoscale + `mon_target_pg_per_osd` |
    | Scrub | `osd_max_scrubs`، پنجره deep-scrub |
    | شبکه | public / cluster — [public.md](../../config/global/public.md) |
    | CRUSH | rule هر rack / DC |

    ## دستورات

    ```bash
    ceph osd crush class ls
    ceph osd crush tree
    ceph osd perf
    ceph osd reweight-by-utilization 0.05
    ceph osd ok-to-stop osd.0 osd.1 osd.2
    ```

    ## پیکربندی

    ```bash
    ./scripts/lookup-config.sh osd_mclock_profile
    ./scripts/lookup-config.sh osd_max_scrubs
    ```

    Deep dive: [OSD](../osd-config/OVERVIEW.md) · [recovery](../osd-config/recovery/recovery.md)

    ## محدود کردن recovery

    ```bash
    ceph config set osd osd_max_backfills 1
    ceph config set osd osd_recovery_max_active 3
    ```

    [← نمای کلی راهنما](../OVERVIEW.md)

  zh: |
    # 大型生产规模

    <span class="badge badge-scale-large">Large production</span> **12+ 节点**、大量 OSD、严格 SLA、独立网络、性能调优。

    ## 重点领域

    | 领域 | 措施 |
    |------|------|
    | 调度 | `osd_mclock_profile`、设备类 |
    | PG | 自动扩缩 + `mon_target_pg_per_osd` |
    | Scrub | `osd_max_scrubs`、深度 scrub 窗口 |
    | 网络 | public / cluster — [public.md](../../config/global/public.md) |
    | CRUSH | 每机架/数据中心规则 |

    ## 命令

    ```bash
    ceph osd crush class ls
    ceph osd crush tree
    ceph osd perf
    ceph osd reweight-by-utilization 0.05
    ceph osd ok-to-stop osd.0 osd.1 osd.2
    ```

    ## 配置审查

    ```bash
    ./scripts/lookup-config.sh osd_mclock_profile
    ./scripts/lookup-config.sh osd_max_scrubs
    ```

    深度指南：[OSD](../osd-config/OVERVIEW.md) · [recovery](../osd-config/recovery/recovery.md)

    ## 限制恢复（业务时段）

    ```bash
    ceph config set osd osd_max_backfills 1
    ceph config set osd osd_recovery_max_active 3
    ```

    [← 指南概览](../OVERVIEW.md)

guides/scales/multisite:
  en: |
    # Multisite Scale

    <span class="badge badge-scale-multi">Multisite</span> Multiple datacenters or regions — RGW zones, optional RBD / CephFS mirroring.

    ## Patterns

    | Use case | Components |
    |----------|------------|
    | S3 geo-distribution | RGW realm → zonegroup → zones, `period update` |
    | Block DR | RBD mirroring (pool or image mode) |
    | CephFS DR | cephfs-mirror snapshot sync |

    ## RGW multisite

    ```bash
    radosgw-admin realm list
    radosgw-admin sync status
    radosgw-admin period update --commit
    ceph config get client.rgw rgw_zone
    ```

    CLI: [cli/rgw.md](../../cli/rgw.md)  
    Config: [config/rgw/INDEX.md](../../config/rgw/INDEX.md)  
    Deep dives: [multisite-zones.md](../rgw-config/multisite/multisite-zones.md) · [multisite-sync.md](../rgw-config/multisite/multisite-sync.md)

    ```bash
    ./scripts/search-config.sh -s rgw zone
    ```

    ## RBD mirror

    ```bash
    rbd mirror pool enable rbd image
    rbd mirror pool status rbd
    rbd mirror image promote rbd/image --force
    ```

    Config: [config/rbd-mirror/INDEX.md](../../config/rbd-mirror/INDEX.md)

    ## CephFS mirror

    ```bash
    ceph fs snapshot mirror enable myfs
    ceph fs snapshot mirror info myfs
    ```

    Config: [config/cephfs-mirror/INDEX.md](../../config/cephfs-mirror/INDEX.md)

    ## Role guides

    | Role | Guide |
    |------|-------|
    | RGW multisite | [rgw-admin.md](../roles/rgw-admin.md) |
    | CephFS DR | [cephfs-admin.md](../roles/cephfs-admin.md) |
    | Cluster / mon | [cluster-admin.md](../roles/cluster-admin.md) |

    ## Caveats

    - Latency between sites affects RGW sync and RBD journal lag
    - Test failover (`promote`) in maintenance windows
    - Plan CRUSH and pools per site for erasure + multisite

    [← Guides overview](../OVERVIEW.md)

  fa: |
    # مقیاس Multisite

    <span class="badge badge-scale-multi">Multisite</span> چند datacenter یا region — zoneهای RGW، mirroring اختیاری RBD / CephFS.

    ## الگوها

    | کاربرد | اجزا |
    |--------|------|
    | S3 چندسایته | realm → zonegroup → zone، `period update` |
    | DR بلوک | RBD mirroring |
    | DR CephFS | cephfs-mirror |

    ## RGW multisite

    ```bash
    radosgw-admin realm list
    radosgw-admin sync status
    radosgw-admin period update --commit
    ceph config get client.rgw rgw_zone
    ```

    [cli/rgw.md](../../cli/rgw.md) · [multisite-zones.md](../rgw-config/multisite/multisite-zones.md)

    ```bash
    ./scripts/search-config.sh -s rgw zone
    ```

    ## RBD mirror

    ```bash
    rbd mirror pool enable rbd image
    rbd mirror pool status rbd
    rbd mirror image promote rbd/image --force
    ```

    ## CephFS mirror

    ```bash
    ceph fs snapshot mirror enable myfs
    ceph fs snapshot mirror info myfs
    ```

    ## راهنمای نقش

    [rgw-admin.md](../roles/rgw-admin.md) · [cephfs-admin.md](../roles/cephfs-admin.md)

    ## هشدار

    - latency بین سایت‌ها روی sync RGW اثر دارد
    - failover را در پنجره نگهداری تست کنید

    [← نمای کلی راهنما](../OVERVIEW.md)

  zh: |
    # 多站点规模

    <span class="badge badge-scale-multi">Multisite</span> 多数据中心或区域 — RGW zone、可选 RBD / CephFS 镜像。

    ## 模式

    | 用例 | 组件 |
    |------|------|
    | S3 地理分布 | realm → zonegroup → zone、`period update` |
    | 块存储 DR | RBD mirroring |
    | CephFS DR | cephfs-mirror |

    ## RGW 多站点

    ```bash
    radosgw-admin realm list
    radosgw-admin sync status
    radosgw-admin period update --commit
    ceph config get client.rgw rgw_zone
    ```

    [cli/rgw.md](../../cli/rgw.md) · [multisite-zones.md](../rgw-config/multisite/multisite-zones.md)

    ```bash
    ./scripts/search-config.sh -s rgw zone
    ```

    ## RBD 镜像

    ```bash
    rbd mirror pool enable rbd image
    rbd mirror pool status rbd
    rbd mirror image promote rbd/image --force
    ```

    ## CephFS 镜像

    ```bash
    ceph fs snapshot mirror enable myfs
    ceph fs snapshot mirror info myfs
    ```

    ## 角色指南

    [rgw-admin.md](../roles/rgw-admin.md) · [cephfs-admin.md](../roles/cephfs-admin.md)

    ## 注意

    - 站点间延迟影响 RGW 同步与 RBD journal
    - 在维护窗口测试 failover（`promote`）

    [← 指南概览](../OVERVIEW.md)
