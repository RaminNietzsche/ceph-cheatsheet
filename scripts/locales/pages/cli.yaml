cli/config:
  fa: |
    # دستورات پیکربندی

    پیکربندی runtime در پایگاه config مانیتور ذخیره می‌شود. نام گزینه‌ها، پیش‌فرض و پرچم‌ها در [مرجع config](../config/OVERVIEW.md).

    ## خواندن config

    ```bash
    ceph config show <who>                 # effective config for a daemon
    ceph config show-with-defaults <who>
    ceph config get <who> <option>
    ceph config dump                       # entire config database
    ceph config help <option>              # option metadata (if documented)
    ```

    نمونه `<who>`: `global`، `mon`، `osd`، `osd.0`، `mgr`، `mds`، `rgw`، `client.rgw.gateway1`

    ## تنظیم config

    ```bash
    ceph config set <who> <option> <value>
    ceph config rm <who> <option>          # remove override (revert to default)
    ceph config assimilate-conf -i ceph.conf   # import ceph.conf into mon store
    ```

    مثال‌ها:

    ```bash
    ceph config set global mon_allow_pool_delete true
    ceph config set osd.0 osd_max_scrubs 2
    ceph config set mgr debug_mgr 20/5
    ceph config set client.rgw.mygw rgw frontends "beast ssl_port=443"
    ```

    ## Legacy / injectargs

    ```bash
    ceph tell osd.* injectargs '--debug-osd=10/5'   # temporary (lost on restart)
    ```

    برای تغییرات پایدار `ceph config set` را ترجیح دهید.

    ## ceph.conf محلی

    گزینه‌های bootstrap و محلی فقط در `/etc/ceph/ceph.conf`:

    ```ini
    [global]
        fsid = …
        mon_host = 10.0.0.1,10.0.0.2

    [mon]
        mon_allow_pool_delete = false

    [osd]
        osd_memory_target = 4294967296
    ```

    برای به‌روزرسانی runtime، پرچم `RUNTIME` را در [جداول config](../config/OVERVIEW.md) ببینید.

    ## جستجوی محلی گزینه

    ```bash
    ./scripts/lookup-config.sh osd_max_scrubs
    ./scripts/search-config.sh -s osd scrub
    ```

    [← نمای کلی CLI](OVERVIEW.md) · [مرجع Config](../config/OVERVIEW.md)
  zh: |
    # 配置命令

    运行时配置存储在 Monitor 配置库中。选项名、默认值与标志见 [配置参考](../config/OVERVIEW.md)。

    ## 读取配置

    ```bash
    ceph config show <who>                 # effective config for a daemon
    ceph config show-with-defaults <who>
    ceph config get <who> <option>
    ceph config dump                       # entire config database
    ceph config help <option>              # option metadata (if documented)
    ```

    `<who>` 示例：`global`、`mon`、`osd`、`osd.0`、`mgr`、`mds`、`rgw`、`client.rgw.gateway1`

    ## 设置配置

    ```bash
    ceph config set <who> <option> <value>
    ceph config rm <who> <option>          # remove override (revert to default)
    ceph config assimilate-conf -i ceph.conf   # import ceph.conf into mon store
    ```

    示例：

    ```bash
    ceph config set global mon_allow_pool_delete true
    ceph config set osd.0 osd_max_scrubs 2
    ceph config set mgr debug_mgr 20/5
    ceph config set client.rgw.mygw rgw frontends "beast ssl_port=443"
    ```

    ## 旧式 / injectargs

    ```bash
    ceph tell osd.* injectargs '--debug-osd=10/5'   # temporary (lost on restart)
    ```

    持久变更请优先使用 `ceph config set`。

    ## 本地 ceph.conf

    bootstrap 与仅本地选项仍在 `/etc/ceph/ceph.conf`：

    ```ini
    [global]
        fsid = …
        mon_host = 10.0.0.1,10.0.0.2

    [mon]
        mon_allow_pool_delete = false

    [osd]
        osd_memory_target = 4294967296
    ```

    是否支持运行时更新：在 [配置表](../config/OVERVIEW.md) 中查看 `RUNTIME` 标志。

    ## 本地查找配置项

    ```bash
    ./scripts/lookup-config.sh osd_max_scrubs
    ./scripts/search-config.sh -s osd scrub
    ```

    [← CLI 概览](OVERVIEW.md) · [配置参考](../config/OVERVIEW.md)

cli/osd-pool:
  fa: |
    # دستورات OSD، Pool و PG

    ## چرخهٔ عمر OSD

    ```bash
    ceph osd tree
    ceph osd ls
    ceph osd ls-tree <bucket>          # e.g. host, rack, root
    ceph osd find <id>
    ceph osd metadata <id>
    ceph osd perf

    # Mark OSD in/out/down
    ceph osd down <id>                 # mark down (admin)
    ceph osd in <id>                   # allow data (default)
    ceph osd out <id>                  # drain — triggers backfill
    ceph osd rm <id>                   # remove from cluster (must be out + down)
    ceph osd destroy <id> --yes-i-really-mean-it

    # Weights and rebalancing
    ceph osd crush reweight <id> <weight>
    ceph osd reweight-by-utilization [max_change] [max_osds]
    ceph osd reweight-by-pg [threshold]
    ```

    ## نگهداری OSD

    ```bash
    ceph osd safe-to-destroy <id>      # check before destroy
    ceph osd ok-to-stop osd.<id> …     # check before stopping multiple OSDs
    ceph osd blocked-by                # what's blocking PGs
    ceph osd require-min-compat-client <release>
    ```

    ## Scrub و deep-scrub

    ```bash
    ceph pg scrub <pgid>
    ceph pg deep-scrub <pgid>
    ceph osd scrub <osd-id>            # all PGs on OSD
    ceph osd deep-scrub <osd-id>
    ```

    ## مدیریت pool

    ```bash
    ceph osd lspools
    ceph osd pool ls detail
    ceph osd pool create <name> <pg> [<pgp>] [replicated|erasure] [<crush-rule>] [<expected-num-objects>]
    ceph osd pool delete <name> [<name> --yes-i-really-really-mean-it]
    ceph osd pool rename <old> <new>
    ceph osd pool get <name> all
    ceph osd pool set <name> size <n>
    ceph osd pool set <name> min_size <n>
    ceph osd pool set <name> pg_num <n>
    ceph osd pool set <name> pgp_num <n>
    ceph osd pool set <name> crush_rule <rule>
    ceph osd pool set <name> application rbd|rgw|cephfs
    ceph osd pool autoscale-status
    ceph osd pool set <name> pg_autoscale_mode on|off|warn
    ```

    ## Pool با erasure code

    ```bash
    ceph osd erasure-code-profile ls
    ceph osd erasure-code-profile set <profile> k=4 m=2 crush-failure-domain=host
    ceph osd erasure-code-profile rm <profile>
    ceph osd pool create <ec-pool> 12 12 erasure <profile>
    ```

    ## Placement group

    ```bash
    ceph pg dump [filtered]
    ceph pg dump_stuck [inactive|unclean|stale|undersized|degraded]
    ceph pg map <pgid>
    ceph pg <pgid> query
    ceph pg repair <pgid>
    ceph pg force-recovery <pgid>
    ceph pg force-backfill <pgid>
    ceph pg cancel-force-recovery <pgid>
    ```

    ## CRUSH / device class

    ```bash
    ceph osd crush class ls
    ceph osd crush set-device-class <class> <osd> …
    ceph osd crush rule create-replicated <name> default host hdd
    ```

    [← نمای کلی CLI](OVERVIEW.md)
  zh: |
    # OSD、池与 PG 命令

    ## OSD 生命周期

    ```bash
    ceph osd tree
    ceph osd ls
    ceph osd ls-tree <bucket>          # e.g. host, rack, root
