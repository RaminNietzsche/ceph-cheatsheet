cli/rados:
  fa: |
    # دستورات RADOS

    رابط ذخیره‌سازی شیء در سطح پایین. نام pool معمولاً با `-p` یا `--pool` لازم است.

    ## اطلاعات pool

    ```bash
    rados lspools
    rados df
    rados pool stats <pool>
    rados pool get-quota <pool>
    rados pool set-quota <pool> [--max-objects N] [--max-size N]
    ```

    ## اشیاء

    ```bash
    rados -p <pool> ls
    rados -p <pool> ls <prefix>
    rados -p <pool> stat <object>
    rados -p <pool> get <object> <local-file>
    rados -p <pool> put <object> <local-file>
    rados -p <pool> rm <object>
    rados -p <pool> create <object>              # empty object
    rados -p <pool> cp <src> <dest>
    rados -p <pool> mv <src> <dest>
    rados -p <pool> truncate <object> <size>
    rados -p <pool> touch <object>
    ```

    ## xattr و omap

    ```bash
    rados -p <pool> getxattr <object> <attr>
    rados -p <pool> setxattr <object> <attr> <value>
    rados -p <pool> rmxattr <object> <attr>
    rados -p <pool> listxattr <object>
    rados -p <pool> getomapval <object> <key>
    rados -p <pool> setomapval <object> <key> <value>
    rados -p <pool> rmomapkey <object> <key>
    rados -p <pool> listomapkeys <object>
    rados -p <pool> listomapvals <object>
    ```

    ## Snapshot و bench

    ```bash
    rados -p <pool> mksnap <snap-name>
    rados -p <pool> rmsnap <snap-name>
    rados -p <pool> bench <seconds> write|seq|rand [-b blocksize] [-t threads]
    rados cleanup --pool <pool> --prefix <prefix> --dry-run
    ```

    ## مدیریت کلاستر با rados

    ```bash
    rados purge <pool> --yes-i-really-really-mean-it
    rados list-inconsistent-pg <pool>
    rados list-inconsistent-obj <pgid> --format json-pretty
    ```

    [← نمای کلی CLI](OVERVIEW.md)
  zh: |
    # RADOS 命令

    底层对象存储接口。通常需通过 `-p` 或 `--pool` 指定池名。

    ## 池信息

    ```bash
    rados lspools
    rados df
    rados pool stats <pool>
    rados pool get-quota <pool>
    rados pool set-quota <pool> [--max-objects N] [--max-size N]
    ```

    ## 对象

    ```bash
    rados -p <pool> ls
    rados -p <pool> ls <prefix>
    rados -p <pool> stat <object>
    rados -p <pool> get <object> <local-file>
    rados -p <pool> put <object> <local-file>
    rados -p <pool> rm <object>
    rados -p <pool> create <object>              # empty object
    rados -p <pool> cp <src> <dest>
    rados -p <pool> mv <src> <dest>
    rados -p <pool> truncate <object> <size>
    rados -p <pool> touch <object>
    ```

    ## 扩展属性与 omap

    ```bash
    rados -p <pool> getxattr <object> <attr>
    rados -p <pool> setxattr <object> <attr> <value>
    rados -p <pool> rmxattr <object> <attr>
    rados -p <pool> listxattr <object>
    rados -p <pool> getomapval <object> <key>
    rados -p <pool> setomapval <object> <key> <value>
    rados -p <pool> rmomapkey <object> <key>
    rados -p <pool> listomapkeys <object>
    rados -p <pool> listomapvals <object>
    ```

    ## 快照与 bench

    ```bash
    rados -p <pool> mksnap <snap-name>
    rados -p <pool> rmsnap <snap-name>
    rados -p <pool> bench <seconds> write|seq|rand [-b blocksize] [-t threads]
    rados cleanup --pool <pool> --prefix <prefix> --dry-run
    ```

    ## 通过 rados 管理集群

    ```bash
    rados purge <pool> --yes-i-really-really-mean-it
    rados list-inconsistent-pg <pool>
    rados list-inconsistent-obj <pgid> --format json-pretty
    ```

    [← CLI 概览](OVERVIEW.md)

cli/rbd:
  fa: |
    # دستورات RBD

    ## تصاویر

    ```bash
    rbd ls [-p pool]
    rbd ls -l [-p pool]                # long format with size/features
    rbd info <pool>/<image>
    rbd create <pool>/<image> --size <bytes> [--image-feature layering,…]
    rbd rm <pool>/<image>
    rbd rename <src> <dest>
    rbd resize <pool>/<image> --size <bytes> [--allow-shrink]
    rbd clone <parent-pool>/<parent>@<snap> <child-pool>/<child>
    rbd flatten <pool>/<image>
    rbd copy <src-pool>/<src> <dest-pool>/<dest>
    rbd import <file> <pool>/<image>
    rbd export <pool>/<image> <file>
    rbd diff <pool>/<image> [--from-snap snap]
    rbd du [-p pool]
    ```

    ## Snapshot

    ```bash
    rbd snap ls <pool>/<image>
    rbd snap create <pool>/<image>@<snap>
    rbd snap rm <pool>/<image>@<snap>
    rbd snap rename <pool>/<image>@<old> <new>
    rbd snap protect <pool>/<image>@<snap>
    rbd snap unprotect <pool>/<image>@<snap>
    rbd snap purge <pool>/<image>
    ```

    ## Map (kernel / nbd)

    ```bash
    rbd map <pool>/<image>             # kernel krbd
    rbd showmapped
    rbd unmap <pool>/<image>|/dev/rbd*
    rbd map <pool>/<image> --device nbd   # nbd
    ```

    ## قفل و mirroring

    ```bash
    rbd lock ls <pool>/<image>
    rbd lock rm <pool>/<image> <cookie> <entity>
    rbd mirror pool enable <pool> <mode>   # image or pool mode
    rbd mirror pool disable <pool>
    rbd mirror pool status <pool>
    rbd mirror image enable <pool>/<image>
    rbd mirror image status <pool>/<image>
    rbd mirror image resync <pool>/<image>
    rbd mirror image promote <pool>/<image> [--force]
    rbd mirror image demote <pool>/<image>
    ```

    ## Feature و متادیتا

    ```bash
    rbd feature ls <pool>/<image>
    rbd feature enable <pool>/<image> <feature>
    rbd feature disable <pool>/<image> <feature>
    rbd metadata ls <pool>/<image>
    rbd image-meta get/set/rm <pool>/<image> <key> [value]
    ```

    ## featureهای رایج تصویر

    | Feature | Bit | توضیح |
    |---------|-----|-------|
    | layering | +1 | clone/snapshot |
    | exclusive-lock | +4 | برای live migration لازم |
    | object-map | +8 | diff سریع، deep-flatten |
    | fast-diff | +16 | diff کارآمد |
    | deep-flatten | +32 | flatten cloneها |
    | journaling | +64 | RBD mirroring |
    | data-pool | +128 | pool داده جدا |

    پیش‌فرض featureها: `rbd_default_features` در [config/rbd](../config/rbd/INDEX.md).

    [← نمای کلی CLI](OVERVIEW.md)
  zh: |
    # RBD 命令

    ## 镜像

    ```bash
    rbd ls [-p pool]
    rbd ls -l [-p pool]                # long format with size/features
    rbd info <pool>/<image>
    rbd create <pool>/<image> --size <bytes> [--image-feature layering,…]
    rbd rm <pool>/<image>
    rbd rename <src> <dest>
    rbd resize <pool>/<image> --size <bytes> [--allow-shrink]
    rbd clone <parent-pool>/<parent>@<snap> <child-pool>/<child>
    rbd flatten <pool>/<image>
    rbd copy <src-pool>/<src> <dest-pool>/<dest>
    rbd import <file> <pool>/<image>
    rbd export <pool>/<image> <file>
    rbd diff <pool>/<image> [--from-snap snap]
    rbd du [-p pool]
    ```

    ## 快照

    ```bash
    rbd snap ls <pool>/<image>
    rbd snap create <pool>/<image>@<snap>
    rbd snap rm <pool>/<image>@<snap>
    rbd snap rename <pool>/<image>@<old> <new>
    rbd snap protect <pool>/<image>@<snap>
    rbd snap unprotect <pool>/<image>@<snap>
    rbd snap purge <pool>/<image>
    ```

    ## 映射（kernel / nbd）

    ```bash
    rbd map <pool>/<image>             # kernel krbd
    rbd showmapped
    rbd unmap <pool>/<image>|/dev/rbd*
    rbd map <pool>/<image> --device nbd   # nbd
    ```

    ## 锁定与镜像

    ```bash
    rbd lock ls <pool>/<image>
    rbd lock rm <pool>/<image> <cookie> <entity>
    rbd mirror pool enable <pool> <mode>   # image or pool mode
    rbd mirror pool disable <pool>
    rbd mirror pool status <pool>
    rbd mirror image enable <pool>/<image>
    rbd mirror image status <pool>/<image>
    rbd mirror image resync <pool>/<image>
    rbd mirror image promote <pool>/<image> [--force]
    rbd mirror image demote <pool>/<image>
    ```

    ## 特性与元数据

    ```bash
    rbd feature ls <pool>/<image>
    rbd feature enable <pool>/<image> <feature>
    rbd feature disable <pool>/<image> <feature>
    rbd metadata ls <pool>/<image>
    rbd image-meta get/set/rm <pool>/<image> <key> [value]
    ```

    ## 常见镜像特性

    | Feature | Bit | 说明 |
    |---------|-----|------|
    | layering | +1 | 克隆/快照 |
    | exclusive-lock | +4 | live migration 所需 |
    | object-map | +8 | 快速 diff、deep-flatten |
    | fast-diff | +16 | 高效 diff |
    | deep-flatten | +32 | 扁平化克隆 |
    | journaling | +64 | RBD 镜像 |
    | data-pool | +128 | 独立数据池 |

    默认特性：见 [config/rbd](../config/rbd/INDEX.md) 中的 `rbd_default_features`。

