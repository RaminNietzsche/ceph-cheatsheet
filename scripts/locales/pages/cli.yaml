    ## S3 CLI 示例（awscli / s3cmd）

    ```bash
    aws s3 ls --endpoint-url http://<rgw_host>
    aws s3 mb s3://<bucket_name> --endpoint-url http://<rgw_host>
    aws s3 cp <local_file> s3://<bucket_name>/<object_key> \
      --endpoint-url http://<rgw_host>
