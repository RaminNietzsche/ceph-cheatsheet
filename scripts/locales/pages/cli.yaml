# CLI reference — fa / zh (command blocks stay English in all locales).

cli/OVERVIEW:
  fa: |
    # مرجع دستورات CLI

    <span class="badge badge-cli">CLI</span> دستورات ضروری Ceph برای مدیریت روزانهٔ کلاستر. فرض: کلاستر در حال اجرا، دسترسی به `ceph` و credential مناسب (`ceph.conf` / keyring).

    <table class="guide-table">
    <thead>
    <tr><th>بخش</th><th>موضوعات</th></tr>
    </thead>
    <tbody>
    <tr class="row-cluster"><td><span class="badge badge-cli">cluster</span> <a href="cluster/">→</a></td><td>وضعیت، سلامت، مانیتور، نسخه‌ها</td></tr>
    <tr class="row-small"><td><span class="badge badge-cli">config</span> <a href="config/">→</a></td><td>پیکربندی runtime (<code>ceph config …</code>)</td></tr>
    <tr class="row-storage"><td><span class="badge badge-cli">osd-pool</span> <a href="osd-pool/">→</a></td><td>OSD، pool، placement group</td></tr>
    <tr class="row-lab"><td><span class="badge badge-cli">rados</span> <a href="rados/">→</a></td><td>شیء و pool در سطح پایین RADOS</td></tr>
    <tr class="row-large"><td><span class="badge badge-cli">rbd</span> <a href="rbd/">→</a></td><td>تصویر بلوکی، snapshot، map</td></tr>
    <tr class="row-rgw"><td><span class="badge badge-cli">rgw</span> <a href="rgw/">→</a></td><td>مدیریت S3/Swift، کاربر، bucket</td></tr>
    <tr class="row-cephfs"><td><span class="badge badge-cli">cephfs</span> <a href="cephfs/">→</a></td><td>فایل‌سیستم، MDS، mount</td></tr>
    <tr class="row-multi"><td><span class="badge badge-cli">cephadm</span> <a href="cephadm/">→</a></td><td>ارکستراتور، سرویس، میزبان</td></tr>
    <tr class="row-dev"><td><span class="badge badge-cli">troubleshooting</span> <a href="troubleshooting/">→</a></td><td>log، عملکرد، recovery، رفع مشکلات رایج</td></tr>
    </tbody>
    </table>

    ## پرچم‌های سراسری

    بیشتر دستورات این‌ها را می‌پذیرند:

    ```bash
    ceph -s                          # short status
    ceph -w                          # watch cluster events
    ceph --cluster mycluster …       # non-default cluster name
    ceph -c /path/ceph.conf …
    ceph -k /path/keyring …
    ceph -n client.admin …           # explicit entity name
    ```

    ## خانوادهٔ دستورات

    | باینری | کاربرد |
    |--------|---------|
    | `ceph` | مدیریت کلاستر — health، config، orch، tell |
    | `rados` | I/O مستقیم pool/شیء |
    | `rbd` | مدیریت block device |
    | `radosgw-admin` | کاربر، bucket و zoneهای RGW |
    | `cephadm` | bootstrap و عملیات cephadm روی نود |
    | `cephfs` | shell تعاملی CephFS |

    ## مثال‌های سریع

    ```bash
    ceph status
    ceph health detail
    ceph osd tree
    ceph df
    ceph pg stat
    rbd ls
    radosgw-admin user list
    ceph orch ps
    ```

    [← Cheatsheet](../index.md)
  zh: |
    # CLI 命令参考

    <span class="badge badge-cli">CLI</span> 日常集群管理必备 Ceph 命令。前提：集群运行中，可访问 `ceph` CLI 及相应凭据（`ceph.conf` / keyring）。

    <table class="guide-table">
    <thead>
    <tr><th>章节</th><th>主题</th></tr>
    </thead>
    <tbody>
    <tr class="row-cluster"><td><span class="badge badge-cli">cluster</span> <a href="cluster/">→</a></td><td>状态、健康、Monitor、版本</td></tr>
    <tr class="row-small"><td><span class="badge badge-cli">config</span> <a href="config/">→</a></td><td>运行时配置（<code>ceph config …</code>）</td></tr>
    <tr class="row-storage"><td><span class="badge badge-cli">osd-pool</span> <a href="osd-pool/">→</a></td><td>OSD、池、PG</td></tr>
    <tr class="row-lab"><td><span class="badge badge-cli">rados</span> <a href="rados/">→</a></td><td>底层 RADOS 对象与池</td></tr>
    <tr class="row-large"><td><span class="badge badge-cli">rbd</span> <a href="rbd/">→</a></td><td>块镜像、快照、映射</td></tr>
    <tr class="row-rgw"><td><span class="badge badge-cli">rgw</span> <a href="rgw/">→</a></td><td>S3/Swift 管理、用户、bucket</td></tr>
    <tr class="row-cephfs"><td><span class="badge badge-cli">cephfs</span> <a href="cephfs/">→</a></td><td>文件系统、MDS、挂载</td></tr>
    <tr class="row-multi"><td><span class="badge badge-cli">cephadm</span> <a href="cephadm/">→</a></td><td>编排器、服务、主机</td></tr>
    <tr class="row-dev"><td><span class="badge badge-cli">troubleshooting</span> <a href="troubleshooting/">→</a></td><td>日志、性能、恢复、常见修复</td></tr>
    </tbody>
    </table>

    ## 全局选项

    多数命令支持：

    ```bash
    ceph -s                          # short status
    ceph -w                          # watch cluster events
    ceph --cluster mycluster …       # non-default cluster name
    ceph -c /path/ceph.conf …
    ceph -k /path/keyring …
    ceph -n client.admin …           # explicit entity name
    ```

    ## 命令族

    | 二进制 | 用途 |
    |--------|------|
    | `ceph` | 集群管理 — 健康、配置、orch、tell |
    | `rados` | 直接 pool/对象 I/O |
    | `rbd` | 块设备管理 |
    | `radosgw-admin` | RGW 用户、bucket、zone |
    | `cephadm` | bootstrap 与节点级 cephadm 操作 |
    | `cephfs` | CephFS 交互 shell |

    ## 快速示例

    ```bash
    ceph status
    ceph health detail
    ceph osd tree
    ceph df
    ceph pg stat
    rbd ls
    radosgw-admin user list
    ceph orch ps
    ```

    [← Cheatsheet](../index.md)

cli/cluster:
  fa: |
    # دستورات کلاستر و مانیتور

    ## وضعیت و سلامت

    ```bash
    ceph status                      # full cluster status (-s)
    ceph -w                          # watch live cluster changes
    ceph health                      # HEALTH_OK / WARN / ERR
    ceph health detail               # expanded health checks
    ceph versions                    # daemon versions across cluster
    ceph mon stat                    # monitor quorum info
    ceph mon dump                    # full mon map
    ceph mgr stat                    # active/standby mgr
    ceph fs ls                       # list CephFS volumes
    ceph osd stat                    # osd summary counts
    ceph osd df                      # per-OSD usage
    ceph osd df tree                 # usage by CRUSH hierarchy
    ceph df                          # cluster capacity summary
    ceph df detail                   # per-pool breakdown
    ceph pg stat                     # placement group summary
    ceph pg dump                     # all PG states (verbose)
    ceph pg dump_stuck               # stuck PGs only
    ceph report                    # recent cluster report
    ```

    ## مدیریت دیمن

    ```bash
    ceph tell osd.<id> version
    ceph tell mon.<id> mon_status
    ceph tell mgr.<id> config show
    ceph daemon osd.<id> config show   # via admin socket (local)
    ceph daemon osd.<id> perf dump
    ceph daemon osd.<id> help
    ```

    ## عملیات مانیتور

    ```bash
    ceph mon add <name> <ip:port>
    ceph mon remove <name>
    ceph mon getmap -o monmap
    ceph quorum_status --format json-pretty
    ```

    ## احراز هویت

    ```bash
    ceph auth ls
    ceph auth get client.admin
    ceph auth get-or-create client.<name> mon 'allow r' osd 'allow rwx pool=<pool>'
    ceph auth del client.<name>
    ceph auth caps client.<name> mon 'profile rbd' osd 'profile rbd pool=rbd'
    ```

    ## نقشه CRUSH

    ```bash
    ceph osd crush tree
    ceph osd crush rule ls
    ceph osd crush rule dump
    ceph osd crush weight-set ls
    ```

    ## مشاهده / پیشرفت

    ```bash
    ceph -w
    ceph progress
    ceph progress json
    ```

    [← نمای کلی CLI](OVERVIEW.md)
  zh: |
    # 集群与 Monitor 命令

    ## 状态与健康

    ```bash
    ceph status                      # full cluster status (-s)
    ceph -w                          # watch live cluster changes
    ceph health                      # HEALTH_OK / WARN / ERR
    ceph health detail               # expanded health checks
    ceph versions                    # daemon versions across cluster
    ceph mon stat                    # monitor quorum info
    ceph mon dump                    # full mon map
    ceph mgr stat                    # active/standby mgr
    ceph fs ls                       # list CephFS volumes
    ceph osd stat                    # osd summary counts
    ceph osd df                      # per-OSD usage
    ceph osd df tree                 # usage by CRUSH hierarchy
    ceph df                          # cluster capacity summary
    ceph df detail                   # per-pool breakdown
    ceph pg stat                     # placement group summary
    ceph pg dump                     # all PG states (verbose)
    ceph pg dump_stuck               # stuck PGs only
    ceph report                    # recent cluster report
    ```

    ## 守护进程管理

    ```bash
    ceph tell osd.<id> version
    ceph tell mon.<id> mon_status
    ceph tell mgr.<id> config show
    ceph daemon osd.<id> config show   # via admin socket (local)
    ceph daemon osd.<id> perf dump
    ceph daemon osd.<id> help
