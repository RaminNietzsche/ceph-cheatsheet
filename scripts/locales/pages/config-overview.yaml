    ## 搜索

    在仓库根目录：

    ```bash
    ./scripts/search-config.sh <option-or-keyword>
    ./scripts/search-config.sh -s osd scrub
    ```

    ## 完整 master 索引

    生成器还会写入 `config/readme.md`（跨子系统 TOC，供脚本使用）。
    通过上方子系统索引浏览选项，或在编辑 `readme.md` 后运行 `python3 scripts/split-index.py`。

    [← Cheatsheet](../index.md)
