docs/index:
  fa: |
    # مرجع Ceph

    مرجع آفلاین و ساده برای مدیران Ceph — بر اساس **نقش**، **مقیاس**، **خط فرمان (CLI)** و **پیکربندی**.

    **منبع:** [ceph/ceph](https://github.com/ceph/ceph) شاخهٔ `main` — تاریخ تولید در [VERSION](version.md).

    ---

    ## از اینجا شروع کنید

    | می‌خواهم… | برو به |
    |-----------|--------|
    | مستندات متناسب با نقشم | [راهنما بر اساس نقش](guides/OVERVIEW.md#by-role) |
    | توصیه بر اساس اندازهٔ کلاستر | [راهنما بر اساس مقیاس](guides/OVERVIEW.md#by-scale) |
    | دستورات کلاستر | [مرجع CLI](cli/OVERVIEW.md) |
    | جستجوی گزینهٔ پیکربندی | [مرجع Config](config/OVERVIEW.md) |
    | چک‌لیست روزانه | [شروع سریع](guides/quickstart.md) |
    | جستجوی محلی | `./scripts/search-all.sh <term>` |
    | یک گزینهٔ پیکربندی | `./scripts/lookup-config.sh <option>` |

    [README](https://github.com/RaminNietzsche/ceph-cheatsheet) · [License](license.md)
  zh: |
    # Ceph 参考

    面向 Ceph 管理员的离线简明参考 — 按 **角色**、**规模**、**CLI** 与 **配置** 组织。

    **来源：** [ceph/ceph](https://github.com/ceph/ceph) `main` — 生成日期见 [VERSION](version.md)。

    ---

    ## 从这里开始

    | 我想… | 前往 |
    |-------|------|
    | 按职责找文档 | [按角色指南](guides/OVERVIEW.md#by-role) |
    | 按集群规模找建议 | [按规模指南](guides/OVERVIEW.md#by-scale) |
    | 运行集群命令 | [CLI 参考](cli/OVERVIEW.md) |
    | 查找配置项 | [Config 参考](config/OVERVIEW.md) |
    | 日常检查清单 | [快速入门](guides/quickstart.md) |
    | 本地搜索 | `./scripts/search-all.sh <term>` |
    | 单个配置项 | `./scripts/lookup-config.sh <option>` |

    [README](https://github.com/RaminNietzsche/ceph-cheatsheet) · [License](license.md)

guides/OVERVIEW:
  fa: |
    # راهنما

    مستندات وظیفه‌محور بر اساس **نقش شما** و **اندازهٔ کلاستر**.

    ## بر اساس نقش

    <table class="guide-table">
    <thead>
    <tr><th>نقش</th><th>مسئولیت شما…</th><th>شروع از اینجا</th></tr>
    </thead>
    <tbody>
    <tr class="row-cluster">
      <td><span class="badge badge-role-cluster">مدیر کلاستر</span> <a href="roles/cluster-admin/">→</a></td>
      <td>Mon، MGR، cephadm، ارتقا، احراز هویت</td>
      <td>سلامت روزانه، orchestrator</td>
    </tr>
    <tr class="row-storage">
      <td><span class="badge badge-role-storage">مسئول ذخیره‌سازی</span> <a href="roles/storage-operator/">→</a></td>
      <td>OSD، pool، PG، CRUSH، ظرفیت</td>
      <td>عملیات OSD/pool، بازیابی</td>
    </tr>
    <tr class="row-rgw">
      <td><span class="badge badge-role-rgw">مدیر RGW</span> <a href="roles/rgw-admin/">→</a></td>
      <td>درگاه S3، کاربران، چندسایته</td>
      <td>radosgw-admin، پیکربندی RGW</td>
    </tr>
    <tr class="row-cephfs">
      <td><span class="badge badge-role-cephfs">مدیر CephFS</span> <a href="roles/cephfs-admin/">→</a></td>
      <td>فایل‌سیستم، MDS، mount</td>
      <td>ceph fs، پیکربندی MDS</td>
    </tr>
    </tbody>
    </table>

    ## بر اساس مقیاس

    <table class="guide-table">
    <thead>
    <tr><th>مقیاس</th><th>اندازهٔ معمول</th><th>شروع از اینجا</th></tr>
    </thead>
    <tbody>
    <tr class="row-lab">
      <td><span class="badge badge-scale-lab">آزمایشگاه / توسعه</span> <a href="scales/lab/">→</a></td>
      <td>۱–۳ نود، آزمایش</td>
      <td>راه‌اندازی minimal، تنظیم آزاد</td>
    </tr>
    <tr class="row-small">
      <td><span class="badge badge-scale-small">محیط عملیاتی کوچک</span> <a href="scales/small-production/">→</a></td>
      <td>۳–۱۲ نود</td>
      <td>Replica 3، autoscale PG</td>
    </tr>
    <tr class="row-large">
      <td><span class="badge badge-scale-large">محیط عملیاتی بزرگ</span> <a href="scales/large-production/">→</a></td>
      <td>۱۲+ نود، OSD زیاد</td>
      <td>mclock، scrub، ظرفیت</td>
    </tr>
    <tr class="row-multi">
      <td><span class="badge badge-scale-multi">چندسایته</span> <a href="scales/multisite/">→</a></td>
      <td>چند سایت / منطقه</td>
      <td>zoneهای RGW، mirroring</td>
    </tr>
    </tbody>
    </table>

    ## عمومی

    - [شروع سریع](quickstart.md) — چک‌لیست روزانه (هر نقش)
    - [جستجوی پیکربندی](config-lookup.md) — خواندن جداول گزینه‌ها
    - **راهنمای عمیق پیکربندی** (MkDocs: راهنما → راهنمای عمیق پیکربندی) — تنظیم و مثال برای هر زیرسیستم:
      RGW · [OSD](osd-config/OVERVIEW.md) · [MON](mon-config/OVERVIEW.md) · [MGR](mgr-config/OVERVIEW.md) · [MDS](mds-config/OVERVIEW.md) · [Global](global-config/OVERVIEW.md)
    - [مشارکت](contributing.md) — قوانین، مهارت‌ها، بازتولید

    [← مرجع اصلی](../index.md)
  zh: |
    # 指南

    按 **职责** 与 **集群规模** 组织的任务导向文档。

    ## 按角色

    <table class="guide-table">
    <thead>
    <tr><th>角色</th><th>您负责…</th><th>从这里开始</th></tr>
    </thead>
    <tbody>
    <tr class="row-cluster">
      <td><span class="badge badge-role-cluster">集群管理员</span> <a href="roles/cluster-admin/">→</a></td>
      <td>Mon、MGR、cephadm、升级、认证</td>
      <td>日常健康、编排器</td>
    </tr>
    <tr class="row-storage">
      <td><span class="badge badge-role-storage">存储运维</span> <a href="roles/storage-operator/">→</a></td>
      <td>OSD、池、PG、CRUSH、容量</td>
      <td>OSD/池操作、恢复</td>
    </tr>
    <tr class="row-rgw">
      <td><span class="badge badge-role-rgw">RGW 管理员</span> <a href="roles/rgw-admin/">→</a></td>
      <td>S3 网关、用户、多站点</td>
      <td>radosgw-admin、RGW 配置</td>
    </tr>
    <tr class="row-cephfs">
      <td><span class="badge badge-role-cephfs">CephFS 管理员</span> <a href="roles/cephfs-admin/">→</a></td>
      <td>文件系统、MDS、挂载</td>
      <td>ceph fs、MDS 配置</td>
    </tr>
    </tbody>
    </table>

    ## 按规模

    <table class="guide-table">
    <thead>
    <tr><th>规模</th><th>典型大小</th><th>从这里开始</th></tr>
    </thead>
    <tbody>
    <tr class="row-lab">
      <td><span class="badge badge-scale-lab">实验室 / 开发</span> <a href="scales/lab/">→</a></td>
      <td>1–3 节点，测试</td>
      <td>最小部署、宽松调优</td>
    </tr>
    <tr class="row-small">
      <td><span class="badge badge-scale-small">小型生产</span> <a href="scales/small-production/">→</a></td>
      <td>3–12 节点</td>
      <td>三副本、PG 自动扩缩</td>
    </tr>
    <tr class="row-large">
      <td><span class="badge badge-scale-large">大型生产</span> <a href="scales/large-production/">→</a></td>
      <td>12+ 节点，大量 OSD</td>
      <td>mclock、scrub、容量</td>
    </tr>
    <tr class="row-multi">
      <td><span class="badge badge-scale-multi">多站点</span> <a href="scales/multisite/">→</a></td>
      <td>多站点 / 区域</td>
      <td>RGW zone、镜像</td>
    </tr>
    </tbody>
    </table>

    ## 通用

    - [快速入门](quickstart.md) — 日常检查清单（任意角色）
    - [配置查找](config-lookup.md) — 阅读选项表
    - **配置深度指南**（MkDocs：指南 → 配置深度指南）— 各子系统调优与示例：
      RGW · [OSD](osd-config/OVERVIEW.md) · [MON](mon-config/OVERVIEW.md) · [MGR](mgr-config/OVERVIEW.md) · [MDS](mds-config/OVERVIEW.md) · [Global](global-config/OVERVIEW.md)
    - [贡献](contributing.md) — 规则、技能、重新生成

    [← 主参考](../index.md)
