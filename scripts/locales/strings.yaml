when_use_dev:
  en: "Development, testing, or upstream debugging only — not for production tuning."
  fa: "فقط برای توسعه، آزمایش یا اشکال‌زدایی upstream — نه برای تنظیم در محیط عملیاتی."
  zh: "仅用于开发、测试或 upstream 调试 — 不可用于生产调优。"

when_use_bool_true:
  en: "Enabled by default; disable only when troubleshooting the related feature."
  fa: "به‌طور پیش‌فرض فعال است؛ فقط هنگام عیب‌یابی قابلیت مرتبط غیرفعال کنید."
  zh: "默认启用；仅在排查相关功能问题时禁用。"

when_use_bool_false:
  en: "Disabled by default; enable when you need the feature and accept its trade-offs."
  fa: "به‌طور پیش‌فرض غیرفعال است؛ وقتی به این قابلیت نیاز دارید و مبادله‌های آن را می‌پذیرید، فعال کنید."
  zh: "默认禁用；需要该功能并接受其权衡时启用。"

when_use_external_url:
  en: "Set when integrating with an external service; leave empty if unused."
  fa: "هنگام یکپارچه‌سازی با سرویس خارجی تنظیم کنید؛ اگر استفاده نمی‌شود خالی بگذارید."
  zh: "与外部服务集成时设置；未使用时留空。"

when_use_limits:
  en: "Adjust when hitting resource limits or protecting cluster capacity."
  fa: "وقتی به محدودیت منابع می‌رسید یا ظرفیت کلاستر را محافظت می‌کنید تنظیم کنید."
  zh: "触及资源限制或保护集群容量时调整。"

when_use_intervals:
  en: "Tune background work timing — balance freshness vs cluster load."
  fa: "زمان‌بندی کار پس‌زمینه را تنظیم کنید — تعادل بین تازگی و بار کلاستر."
  zh: "调整后台任务时序 — 在新鲜度与集群负载间平衡。"

when_use_basic:
  en: "Core {title} behavior — review before changing in production."
  fa: "رفتار اصلی {title} — پیش از تغییر در محیط عملیاتی بررسی کنید."
  zh: "核心 {title} 行为 — 生产环境变更前请审阅。"

when_use_advanced:
  en: "Advanced tuning — change from upstream default only with a measured workload and rollback plan."
  fa: "تنظیم پیشرفته — فقط با بار کاری اندازه‌گیری‌شده و برنامهٔ بازگشت (rollback) از پیش‌فرض upstream فاصله بگیرید."
  zh: "高级调优 — 仅在可测量负载与回滚计划下偏离 upstream 默认值。"

when_use_motr:
  en: "Experimental Motr/POSIX RGW backends — use only in specialized PoC deployments."
  fa: "backendهای آزمایشی Motr/POSIX RGW — فقط در استقرار PoC تخصصی."
  zh: "实验性 Motr/POSIX RGW 后端 — 仅用于专用 PoC 部署。"

when_use_rgw_external:
  en: "Set when integrating with an external service; leave empty if the feature is unused."
  fa: "هنگام یکپارچه‌سازی با سرویس خارجی تنظیم کنید؛ اگر قابلیت استفاده نمی‌شود خالی بگذارید."
  zh: "与外部服务集成时设置；未使用该功能时留空。"

when_use_quota:
  en: "Set tenant or platform default limits for new users, accounts, or buckets."
  fa: "محدودیت پیش‌فرض tenant یا پلتفرم برای کاربران، account یا bucket جدید."
  zh: "为新用户、账户或 bucket 设置租户/平台默认限制。"

when_use_max_limit:
  en: "Adjust when clients hit request-size or concurrency limits, or to protect cluster resources."
  fa: "وقتی کلاینت‌ها به محدودیت اندازه یا هم‌زمانی (concurrency) می‌رسند، یا برای محافظت از منابع کلاستر."
  zh: "客户端触及请求大小/并发限制，或保护集群资源时调整。"

when_use_cache:
  en: "Tune when metadata/quota/token caching affects correctness lag or RGW memory pressure."
  fa: "وقتی کش (cache) متادیتا، سهمیه (quota) یا توکن روی تأخیر صحت یا فشار حافظهٔ RGW اثر می‌گذارد."
  zh: "元数据/quota/令牌缓存影响正确性延迟或 RGW 内存压力时调整。"

when_use_sync:
  en: "Multisite replication and sync tuning — adjust when lag or sync load is problematic."
  fa: "تنظیم replication و sync در محیط چندسایته — وقتی تأخیر (lag) یا بار sync مشکل‌ساز است."
  zh: "多站点复制与同步调优 — 延迟或同步负载异常时调整。"

when_use_rgw_basic:
  en: "Core RGW behavior — review before changing in production."
  fa: "رفتار اصلی RGW — پیش از تغییر در محیط عملیاتی بررسی کنید."
  zh: "核心 RGW 行为 — 生产环境变更前请审阅。"

tune_quick_dev:
  en: "Keep upstream default in production"
  fa: "در محیط عملیاتی همان پیش‌فرض upstream"
  zh: "生产环境保持 upstream 默认值"

tune_quick_capacity:
  en: "Match filesystem layout and capacity plan"
  fa: "مطابق چیدمان filesystem و برنامه ظرفیت"
  zh: "匹配文件系统布局与容量规划"

tune_quick_connectivity:
  en: "Use nearest stable endpoint"
  fa: "نزدیک‌ترین نقطهٔ پایانی پایدار"
  zh: "使用最近且稳定的端点"

tune_quick_policy:
  en: "Align with security and compatibility policy"
  fa: "مطابق سیاست امنیت و سازگاری"
  zh: "符合安全与兼容性策略"

tune_quick_bool:
  en: "Enable/disable based on measured need"
  fa: "فعال/غیرفعال بر اساس نیاز اندازه‌گیری‌شده"
  zh: "按实测需求启用/禁用"

tune_quick_bounds:
  en: "Stay within documented bounds"
  fa: "در محدوده مستند بمانید"
  zh: "保持在文档边界内"

tune_quick_default:
  en: "Baseline → adjust → validate under load"
  fa: "خط پایه → تنظیم → اعتبارسنجی تحت بار"
  zh: "基线 → 调整 → 负载下验证"

find_dev_1:
  en: "1. Keep the upstream default (`{default}`) in production."
  fa: "1. پیش‌فرض upstream (`{default}`) را در محیط عملیاتی نگه دارید."
  zh: "1. 生产环境保持 upstream 默认值（`{default}`）。"

find_dev_2:
  en: "2. Change only in a lab while reproducing a specific issue."
  fa: "2. فقط در آزمایشگاه (lab) هنگام بازتولید یک مشکل مشخص تغییر دهید."
  zh: "2. 仅在实验室复现特定问题时修改。"

find_dev_3:
  en: "3. Revert before returning the node to the production pool."
  fa: "3. پیش از بازگرداندن نود به مجموعهٔ عملیاتی، مقدار را برگردانید."
  zh: "3. 节点回到生产池前请还原。"

find_cap_1:
  en: "1. Baseline at `{default}`."
  fa: "1. خط پایه روی `{default}`."
  zh: "1. 以 `{default}` 为基线。"

find_cap_2:
  en: "2. Plan capacity and filesystem layout before changing paths."
  fa: "2. قبل از تغییر مسیرها ظرفیت و چیدمان filesystem را برنامه‌ریزی کنید."
  zh: "2. 变更路径前规划容量与文件系统布局。"

find_cap_3:
  en: "3. Ensure all daemons that must share the path see the same mount."
  fa: "3. مطمئن شوید همه دیمن‌هایی که باید مسیر را share کنند mount یکسان دارند."
  zh: "3. 确保需共享路径的守护进程使用相同挂载。"

find_conn_1:
  en: "1. List candidate endpoints from your environment."
  fa: "1. نقاط پایانی (endpoint) کاندید را از محیط خود فهرست کنید."
  zh: "1. 列出环境中的候选端点。"

find_conn_2:
  en: "2. Verify reachability from every node running the daemon."
  fa: "2. دسترسی‌پذیری از هر نودی که دیمن روی آن اجرا می‌شود را بررسی کنید."
  zh: "2. 从运行守护进程的每个节点验证可达性。"

find_conn_3:
  en: "3. Pick the lowest-latency stable endpoint."
  fa: "3. پایدارترین نقطهٔ پایانی با کمترین تأخیر (latency) را انتخاب کنید."
  zh: "3. 选择延迟最低且稳定的端点。"

find_conn_4:
  en: "4. Leave empty (`{default}`) if the integration is disabled."
  fa: "4. اگر یکپارچه‌سازی غیرفعال است خالی (`{default}`) بگذارید."
  zh: "4. 未启用集成时留空（`{default}`）。"

find_policy_1:
  en: "1. Document why `{default}` is correct for your policy."
  fa: "1. مستند کنید چرا `{default}` برای سیاست شما درست است."
  zh: "1. 记录 `{default}` 为何符合您的策略。"

find_policy_2:
  en: "2. Change only for compatibility or security requirements."
  fa: "2. فقط برای الزامات سازگاری یا امنیت تغییر دهید."
  zh: "2. 仅为兼容性或安全要求而变更。"

find_policy_3:
  en: "3. Test client and admin workflows after changes."
  fa: "3. پس از تغییرات، روندهای کاری کلاینت و مدیر را آزمایش کنید."
  zh: "3. 变更后测试客户端与管理流程。"

find_perf_1:
  en: "1. Baseline at upstream default `{default}`."
  fa: "1. خط پایه روی پیش‌فرض upstream `{default}`."
  zh: "1. 以 upstream 默认值 `{default}` 为基线。"

find_perf_2:
  en: "2. Change **one** option per test window under representative load."
  fa: "2. در هر پنجره تست تحت بار نماینده **یک** گزینه را تغییر دهید."
  zh: "2. 在代表性负载下每个测试窗口只改 **一个** 选项。"

find_perf_3:
  en: "3. Compare latency, throughput, and background work before/after."
  fa: "3. تأخیر (latency)، توان عملیاتی (throughput) و کار پس‌زمینه را قبل و بعد مقایسه کنید."
